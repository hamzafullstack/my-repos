    <h1>Flexbox - growing and shrinking</h1>
    <h2>The flex shorthand</h2>
    <p>The flex declaration is actually a shorthand for 3 properties that you can set on a flex item. These properties affect how flex items size themselves within their container.</p>

        <!-- code here -->
     <div class="flex-container">
  <div class="one"></div>
  <div class="two"></div>
  <div class="three"></div>
</div>
