<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lists in HTML</title>
</head>
<body>
    <h1>The Oden Project</h1>
    <p>There are two types of lists in HTML which being widely used</p>
    <p>ordered list - for show items in order</p>
    <p>unordered list - shows items without any order.</p>
    <!-- creating a ordered list -->
     <h3>ordered list</h3>
     <ol>
        <li>item 1</li>
        <li>item 2</li>
        <li>item 3</li>
     </ol>
     <h3>unordered list</h3>
     <ul>
        <li>item 4</li>
        <li>item 5</li>
        <li>item 6</li>
     </ul>
</body>
</html>
